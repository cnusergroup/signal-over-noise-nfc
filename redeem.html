<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>领奖验证 | Signal Hunt</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050914;
      --panel: rgba(13, 25, 50, 0.7);
      --panel-border: rgba(125, 249, 255, 0.12);
      --line: rgba(125, 249, 255, 0.08);
      --signal: #7df9ff;
      --signal-2: #a78bfa;
      --signal-3: #34d399;
      --signal-4: #f472b6;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #f87171;
      --success: #34d399;
      --glow: 0 0 20px rgba(125, 249, 255, 0.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(125, 249, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; padding: 1rem; }

    .login-card, .main-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      backdrop-filter: blur(20px);
      box-shadow: var(--glow);
    }

    .center-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.4rem;
      color: var(--signal);
      text-align: center;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 10px rgba(125, 249, 255, 0.4);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(5, 9, 20, 0.6);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--signal);
      box-shadow: 0 0 0 3px rgba(125, 249, 255, 0.1);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(125, 249, 255, 0.2), rgba(125, 249, 255, 0.1));
      border: 1px solid var(--signal);
      color: var(--signal);
      width: 100%;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(125, 249, 255, 0.3), rgba(125, 249, 255, 0.15));
      box-shadow: var(--glow);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-redeem {
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(52, 211, 153, 0.1));
      border: 1px solid var(--success);
      color: var(--success);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
    }

    .btn-redeem:hover {
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.3), rgba(52, 211, 153, 0.15));
    }

    .btn-redeem:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--panel-border);
      color: var(--muted);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
    }

    .btn-ghost:hover {
      border-color: var(--signal);
      color: var(--signal);
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.8rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0.75rem;
      background: rgba(248, 113, 113, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(248, 113, 113, 0.2);
      display: none;
    }

    .newpass-info {
      color: var(--signal);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      background: rgba(125, 249, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(125, 249, 255, 0.15);
    }

    .tag-info {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: var(--signal);
      padding: 0.75rem;
      background: rgba(125, 249, 255, 0.05);
      border: 1px solid rgba(125, 249, 255, 0.15);
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: center;
      word-break: break-all;
    }

    .reward-item {
      padding: 1rem;
      background: rgba(5, 9, 20, 0.4);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }

    .reward-item:hover {
      border-color: rgba(125, 249, 255, 0.2);
    }

    .reward-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .reward-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .reward-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .redeemed-badge {
      font-size: 0.75rem;
      color: var(--success);
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.25);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-family: 'Share Tech Mono', monospace;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .topbar h1 { margin-bottom: 0; text-align: left; font-size: 1.1rem; }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--panel-border);
      border-top-color: var(--signal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .no-tag-error {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--danger);
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      .login-card, .main-card { padding: 1.5rem; }
      h1 { font-size: 1.2rem; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- NO TAG ERROR -->
    <div id="no-tag-view" class="center-wrap" style="display:none">
      <div class="login-card">
        <h1>SIGNAL HUNT</h1>
        <p class="subtitle">领奖验证</p>
        <div class="no-tag-error">缺少 tagId 参数。请通过参与者二维码扫描进入此页面。</div>
      </div>
    </div>

    <!-- LOGIN VIEW -->
    <div id="login-view" class="center-wrap" style="display:none">
      <div class="login-card">
        <h1>SIGNAL HUNT</h1>
        <p class="subtitle">领奖验证 — 工作人员登录</p>
        <div id="login-form">
          <div class="form-group">
            <label for="login-email">邮箱</label>
            <input type="email" id="login-email" placeholder="admin@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-password">密码</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div id="login-error" class="error-msg"></div>
          <button id="login-btn" class="btn btn-primary" onclick="handleLogin()">登录</button>
        </div>
        <div id="newpass-form" style="display:none">
          <p class="newpass-info">需要设置新密码。</p>
          <div class="form-group">
            <label for="new-password">新密码</label>
            <input type="password" id="new-password" placeholder="新密码" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="confirm-password">确认密码</label>
            <input type="password" id="confirm-password" placeholder="确认密码" autocomplete="new-password" />
          </div>
          <div id="newpass-error" class="error-msg"></div>
          <button id="newpass-btn" class="btn btn-primary" onclick="handleNewPassword()">设置密码</button>
        </div>
      </div>
    </div>

    <!-- REWARDS VIEW -->
    <div id="rewards-view" style="display:none">
      <div class="main-card">
        <div class="topbar">
          <h1>SIGNAL HUNT — 领奖验证</h1>
          <button class="btn btn-ghost" onclick="handleLogout()">退出</button>
        </div>
        <div id="tag-info" class="tag-info"></div>
        <div id="rewards-loading" class="loading"><span class="spinner"></span>加载奖励信息...</div>
        <div id="rewards-list"></div>
        <div id="rewards-empty" class="empty-state" style="display:none">该参与者暂无可领取的奖励。</div>
      </div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    var CONFIG = {
      REGION: 'ap-northeast-1',
      USER_POOL_ID: 'ap-northeast-1_dBdKduSNI',
      CLIENT_ID: '43gokealbmen6doviustcfh62c',
      API_BASE: 'https://7orrwwprye.execute-api.ap-northeast-1.amazonaws.com'
    };

    var currentSession = { idToken: null, accessToken: null, refreshToken: null };
    var cognitoUser = null;
    var userPool = null;
    var tagId = null;
    var rewardsData = [];

    // Get tagId from URL
    var params = new URLSearchParams(window.location.search);
    tagId = params.get('tagId');

    if (!tagId) {
      document.getElementById('no-tag-view').style.display = 'flex';
      return;
    }

    // Init Cognito
    var poolData = { UserPoolId: CONFIG.USER_POOL_ID, ClientId: CONFIG.CLIENT_ID };
    userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

    // Check existing session
    var existingUser = userPool.getCurrentUser();
    if (existingUser) {
      existingUser.getSession(function(err, session) {
        if (!err && session && session.isValid()) {
          cognitoUser = existingUser;
          currentSession.idToken = session.getIdToken().getJwtToken();
          currentSession.accessToken = session.getAccessToken().getJwtToken();
          currentSession.refreshToken = session.getRefreshToken();
          showRewardsView();
        } else {
          showLoginView();
        }
      });
    } else {
      showLoginView();
    }

    function showLoginView() {
      document.getElementById('login-view').style.display = 'flex';
    }

    function showRewardsView() {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('rewards-view').style.display = 'block';
      document.getElementById('tag-info').textContent = 'Tag ID: ' + tagId;
      loadRewards();
    }

    // Login
    window.handleLogin = function() {
      var email = document.getElementById('login-email').value.trim();
      var password = document.getElementById('login-password').value;
      var errorEl = document.getElementById('login-error');
      var btn = document.getElementById('login-btn');

      if (!email || !password) {
        errorEl.textContent = '请输入邮箱和密码。';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';
      errorEl.style.display = 'none';

      var authDetails = new AmazonCognitoIdentity.AuthenticationDetails({
        Username: email, Password: password
      });
      var userData = { Username: email, Pool: userPool };
      cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

      cognitoUser.authenticateUser(authDetails, {
        onSuccess: function(session) {
          currentSession.idToken = session.getIdToken().getJwtToken();
          currentSession.accessToken = session.getAccessToken().getJwtToken();
          currentSession.refreshToken = session.getRefreshToken();
          btn.disabled = false;
          btn.textContent = '登录';
          showRewardsView();
        },
        onFailure: function(err) {
          btn.disabled = false;
          btn.textContent = '登录';
          var msg = '邮箱或密码错误。';
          if (err.code === 'TooManyRequestsException') msg = '尝试次数过多，请稍后再试。';
          if (err.code === 'NetworkError') msg = '网络错误，请检查连接。';
          errorEl.textContent = msg;
          errorEl.style.display = 'block';
        },
        newPasswordRequired: function() {
          btn.disabled = false;
          btn.textContent = '登录';
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('newpass-form').style.display = 'block';
        }
      });
    };

    window.handleNewPassword = function() {
      var newPass = document.getElementById('new-password').value;
      var confirmPass = document.getElementById('confirm-password').value;
      var errorEl = document.getElementById('newpass-error');
      var btn = document.getElementById('newpass-btn');

      if (!newPass || newPass.length < 8) {
        errorEl.textContent = '密码至少需要 8 个字符。';
        errorEl.style.display = 'block';
        return;
      }
      if (newPass !== confirmPass) {
        errorEl.textContent = '两次密码不一致。';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '设置中...';
      errorEl.style.display = 'none';

      cognitoUser.completeNewPasswordChallenge(newPass, {}, {
        onSuccess: function(session) {
          currentSession.idToken = session.getIdToken().getJwtToken();
          currentSession.accessToken = session.getAccessToken().getJwtToken();
          currentSession.refreshToken = session.getRefreshToken();
          btn.disabled = false;
          btn.textContent = '设置密码';
          showRewardsView();
        },
        onFailure: function(err) {
          btn.disabled = false;
          btn.textContent = '设置密码';
          errorEl.textContent = err.message || '设置密码失败。';
          errorEl.style.display = 'block';
        }
      });
    };

    window.handleLogout = function() {
      if (cognitoUser) cognitoUser.signOut();
      currentSession = { idToken: null, accessToken: null, refreshToken: null };
      cognitoUser = null;
      document.getElementById('rewards-view').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('newpass-form').style.display = 'none';
      document.getElementById('login-password').value = '';
      document.getElementById('login-error').style.display = 'none';
      showLoginView();
    };

    function refreshToken() {
      return new Promise(function(resolve) {
        if (!cognitoUser || !currentSession.refreshToken) { resolve(false); return; }
        cognitoUser.refreshSession(currentSession.refreshToken, function(err, session) {
          if (err) { resolve(false); return; }
          currentSession.idToken = session.getIdToken().getJwtToken();
          currentSession.accessToken = session.getAccessToken().getJwtToken();
          currentSession.refreshToken = session.getRefreshToken();
          resolve(true);
        });
      });
    }

    async function apiRequest(method, path, body) {
      var headers = { 'Content-Type': 'application/json' };
      if (currentSession.idToken) {
        headers['Authorization'] = 'Bearer ' + currentSession.idToken;
      }

      var opts = { method: method, headers: headers };
      if (body) opts.body = JSON.stringify(body);

      var response;
      try {
        response = await fetch(CONFIG.API_BASE + path, opts);
      } catch (e) {
        throw new Error('网络错误');
      }

      if (response.status === 401) {
        var refreshed = await refreshToken();
        if (refreshed) {
          headers['Authorization'] = 'Bearer ' + currentSession.idToken;
          opts.headers = headers;
          response = await fetch(CONFIG.API_BASE + path, opts);
        } else {
          window.handleLogout();
          throw new Error('会话已过期');
        }
      }

      var data = await response.json();
      if (!response.ok) throw new Error(data.message || '请求失败');
      return data;
    }

    async function loadRewards() {
      var loadingEl = document.getElementById('rewards-loading');
      var listEl = document.getElementById('rewards-list');
      var emptyEl = document.getElementById('rewards-empty');

      loadingEl.style.display = 'block';
      listEl.innerHTML = '';
      emptyEl.style.display = 'none';

      try {
        var data = await apiRequest('GET', '/checkin/' + encodeURIComponent(tagId) + '/rewards');
        loadingEl.style.display = 'none';

        if (!data.rewards || data.rewards.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }

        rewardsData = data.rewards;
        renderRewards();
      } catch (e) {
        loadingEl.style.display = 'none';
        listEl.innerHTML = '<div class="empty-state" style="color:var(--danger)">加载失败: ' + e.message + '</div>';
      }
    }

    function renderRewards() {
      var listEl = document.getElementById('rewards-list');
      listEl.innerHTML = rewardsData.map(function(r, idx) {
        var name = getRewardName(r);
        var meta = getRewardMeta(r);
        var actions = '';

        if (r.redeemed) {
          var time = r.redeemedAt ? formatTime(r.redeemedAt) : '';
          actions = '<span class="redeemed-badge">已领取 ' + time + '</span>';
        } else {
          actions = '<button class="btn btn-redeem" onclick="redeemReward(' + idx + ', this)">确认领奖</button>';
        }

        return '<div class="reward-item">' +
          '<div class="reward-name">' + name + '</div>' +
          (meta ? '<div class="reward-meta">' + meta + '</div>' : '') +
          '<div class="reward-actions">' + actions + '</div>' +
          '</div>';
      }).join('');
    }

    function getRewardName(r) {
      if (r.type === 'stamp_rally') return '🏆 集邮完成 — 请到服务台领取纪念品';
      if (r.type === 'combo') return '🎁 组合「' + r.name + '」— ' + (r.reward || '');
      if (r.type === 'early_bird') return '🐦 早鸟 #' + r.position + '「' + (r.missionName || '') + '」';
      if (r.type === 'milestone') {
        var station = r.stationId ? ' 站点 ' + r.stationId : '';
        return '🎯 第 ' + r.visitorNumber + ' 位幸运访客 — 活动「' + (r.missionName || '') + '」' + station;
      }
      if (r.type === 'mission_winner') return '🎰 中奖！「' + (r.missionName || '') + '」' + (r.prizeDescription ? ' — ' + r.prizeDescription : '');
      return '🎁 奖励';
    }

    function getRewardMeta(r) {
      var parts = [];
      if (r.awardedAt || r.completedAt) parts.push('获得时间: ' + formatTime(r.awardedAt || r.completedAt));
      if (r.rewardKey) parts.push('Key: ' + r.rewardKey);
      return parts.join(' · ');
    }

    function formatTime(iso) {
      if (!iso) return '';
      try {
        var d = new Date(iso);
        return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch (e) { return iso; }
    }

    window.redeemReward = async function(idx, btn) {
      var reward = rewardsData[idx];
      if (!reward || reward.redeemed) return;

      btn.disabled = true;
      btn.textContent = '处理中...';

      try {
        var result = await apiRequest('POST', '/rewards/redeem', {
          tagId: tagId,
          rewardKey: reward.rewardKey
        });

        reward.redeemed = true;
        reward.redeemedAt = result.redeemedAt || new Date().toISOString();
        renderRewards();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = '确认领奖';
        alert('领奖失败: ' + e.message);
      }
    };

  })();
  </script>
</body>
</html>
