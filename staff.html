<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff | Signal Hunt</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050914;
      --panel: rgba(13, 25, 50, 0.7);
      --panel-border: rgba(125, 249, 255, 0.12);
      --line: rgba(125, 249, 255, 0.08);
      --signal: #7df9ff;
      --signal-2: #a78bfa;
      --signal-3: #34d399;
      --signal-4: #f472b6;
      --signal-5: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #f87171;
      --success: #34d399;
      --glow: 0 0 20px rgba(125, 249, 255, 0.15);
      --glow-strong: 0 0 30px rgba(125, 249, 255, 0.3);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(125, 249, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; }

    /* ===== LOGIN VIEW ===== */
    #login-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(20px);
      box-shadow: var(--glow);
    }

    .login-card h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.5rem;
      color: var(--signal);
      text-align: center;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 10px rgba(125, 249, 255, 0.4);
    }

    .login-card .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: rgba(5, 9, 20, 0.6);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--signal);
      box-shadow: 0 0 0 3px rgba(125, 249, 255, 0.1);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(125, 249, 255, 0.2), rgba(125, 249, 255, 0.1));
      border: 1px solid var(--signal);
      color: var(--signal);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(125, 249, 255, 0.3), rgba(125, 249, 255, 0.15));
      box-shadow: var(--glow);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--panel-border);
      color: var(--muted);
    }

    .btn-ghost:hover { border-color: var(--signal); color: var(--signal); }

    .btn-danger {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover { background: rgba(248, 113, 113, 0.2); }

    .btn-success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .btn-success:hover { background: rgba(52, 211, 153, 0.2); }

    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    .btn-full { width: 100%; justify-content: center; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      color: var(--danger);
      font-size: 0.8rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0.75rem;
      background: rgba(248, 113, 113, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    .newpass-info {
      color: var(--signal);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      background: rgba(125, 249, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(125, 249, 255, 0.15);
    }

    /* ===== TOP BAR ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--panel);
      border-bottom: 1px solid var(--panel-border);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }

    .topbar-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      color: var(--signal);
      text-shadow: 0 0 10px rgba(125, 249, 255, 0.4);
    }

    .topbar-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 4px;
      color: var(--signal-3);
      letter-spacing: 0.1em;
    }

    .topbar-right { display: flex; align-items: center; gap: 1rem; }

    .staff-email {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      padding: 1.5rem;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ===== SEARCH BAR ===== */
    .search-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .search-bar input { flex: 1; }

    /* ===== PANELS ===== */
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      backdrop-filter: blur(10px);
    }

    .panel-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      color: var(--signal);
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--line);
    }

    /* ===== ENTITLEMENT ROW ===== */
    .entitlement-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .entitlement-row:last-child { border-bottom: none; }

    .entitlement-label {
      font-weight: 600;
      font-size: 0.9rem;
      min-width: 80px;
    }

    .entitlement-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .entitlement-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge-entitled {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(52, 211, 153, 0.15);
      color: var(--success);
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .badge-not-entitled {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(100, 116, 139, 0.15);
      color: var(--muted);
      border: 1px solid rgba(100, 116, 139, 0.3);
    }

    .badge-verified {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(167, 139, 250, 0.15);
      color: var(--signal-2);
      border: 1px solid rgba(167, 139, 250, 0.3);
    }

    /* ===== PROGRESS BAR ===== */
    .progress-container {
      margin-bottom: 0.75rem;
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .progress-bar {
      height: 6px;
      background: var(--line);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--signal), var(--signal-2));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .stations-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .station-chip {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: rgba(125, 249, 255, 0.1);
      border: 1px solid rgba(125, 249, 255, 0.2);
      color: var(--signal);
    }

    .station-chip.not-visited {
      background: rgba(100, 116, 139, 0.1);
      border-color: rgba(100, 116, 139, 0.2);
      color: var(--muted);
    }

    /* ===== REWARDS LIST ===== */
    .reward-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--line);
      gap: 0.5rem;
    }

    .reward-item:last-child { border-bottom: none; }

    .reward-name {
      font-size: 0.85rem;
      flex: 1;
    }

    .reward-redeemed {
      font-size: 0.75rem;
      color: var(--success);
    }

    .reward-pending {
      font-size: 0.75rem;
      color: var(--signal-5);
    }

    /* ===== LOADING ===== */
    .loading-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--panel-border);
      border-top-color: var(--signal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 9999;
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: rgba(52, 211, 153, 0.9); color: #050914; }
    .toast.error { background: rgba(248, 113, 113, 0.9); color: #050914; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .topbar { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
      .topbar-right { width: 100%; justify-content: space-between; }
      .main-content { padding: 1rem; }
      .search-bar { flex-direction: column; }
      .entitlement-row { flex-direction: column; align-items: flex-start; }
      .staff-email { display: none; }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--signal); }
  </style>
</head>
<body>
  <div id="app">
    <!-- LOGIN VIEW -->
    <div id="login-view">
      <div class="login-card">
        <h1>SIGNAL HUNT</h1>
        <p class="subtitle">工作人员管理</p>
        <div id="login-form">
          <div class="form-group">
            <label for="login-email">邮箱</label>
            <input type="email" id="login-email" placeholder="staff@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-password">密码</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div id="login-error" class="error-msg" style="display:none"></div>
          <button id="login-btn" class="btn btn-primary btn-full" onclick="handleLogin()">登录</button>
        </div>
        <div id="newpass-form" style="display:none">
          <p class="newpass-info">需要设置新密码。请设置您的永久密码。</p>
          <div class="form-group">
            <label for="new-password">新密码</label>
            <input type="password" id="new-password" placeholder="新密码" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="confirm-password">确认密码</label>
            <input type="password" id="confirm-password" placeholder="确认密码" autocomplete="new-password" />
          </div>
          <div id="newpass-error" class="error-msg" style="display:none"></div>
          <button id="newpass-btn" class="btn btn-primary btn-full" onclick="handleNewPassword()">设置密码</button>
        </div>
      </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" style="display:none">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">SIGNAL HUNT</h1>
          <span class="topbar-badge">工作人员</span>
        </div>
        <div class="topbar-right">
          <span id="staff-email" class="staff-email"></span>
          <button class="btn btn-ghost btn-sm" onclick="handleLogout()">退出</button>
        </div>
      </header>

      <main class="main-content">
        <!-- Search Bar -->
        <div class="search-bar">
          <input type="text" id="tag-input" placeholder="输入 Tag ID..." />
          <button class="btn btn-primary" onclick="lookupTag()">查询</button>
        </div>

        <!-- Results Container -->
        <div id="results-container" style="display:none">
          <!-- Progress Panel -->
          <div class="panel" id="progress-panel">
            <div class="panel-header">参与者进度</div>
            <div id="progress-content">
              <div class="loading-indicator"><div class="spinner"></div><span>加载中...</span></div>
            </div>
          </div>

          <!-- Entitlement Panel -->
          <div class="panel" id="entitlement-panel">
            <div class="panel-header">资格管理</div>
            <div id="entitlement-content">
              <div class="loading-indicator"><div class="spinner"></div><span>加载中...</span></div>
            </div>
          </div>

          <!-- Rewards Panel -->
          <div class="panel" id="rewards-panel">
            <div class="panel-header">奖励管理</div>
            <div id="rewards-content">
              <div class="loading-indicator"><div class="spinner"></div><span>加载中...</span></div>
            </div>
          </div>
        </div>

        <div id="empty-state" class="empty-state">输入 Tag ID 查询参与者信息</div>
      </main>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
  // ===== CONFIGURATION =====
  const CONFIG = {
    REGION: 'ap-northeast-1',
    USER_POOL_ID: 'ap-northeast-1_dBdKduSNI',
    CLIENT_ID: '43gokealbmen6doviustcfh62c',
    API_BASE: 'https://7orrwwprye.execute-api.ap-northeast-1.amazonaws.com'
  };

  // ===== STATE =====
  let currentSession = { idToken: null, accessToken: null, refreshToken: null };
  let cognitoUser = null;
  let userPool = null;
  let currentTagId = null;

  // ===== INITIALIZATION =====
  function initCognito() {
    const poolData = { UserPoolId: CONFIG.USER_POOL_ID, ClientId: CONFIG.CLIENT_ID };
    userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

    const currentUser = userPool.getCurrentUser();
    if (currentUser) {
      currentUser.getSession((err, session) => {
        if (!err && session && session.isValid()) {
          cognitoUser = currentUser;
          currentSession.idToken = session.getIdToken().getJwtToken();
          currentSession.accessToken = session.getAccessToken().getJwtToken();
          currentSession.refreshToken = session.getRefreshToken();
          showDashboard();
        }
      });
    }
  }

  // ===== AUTHENTICATION =====
  function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    if (!email || !password) {
      showError(errorEl, '请输入邮箱和密码。');
      return;
    }

    btn.disabled = true;
    btn.textContent = '登录中...';
    errorEl.style.display = 'none';

    const authDetails = new AmazonCognitoIdentity.AuthenticationDetails({
      Username: email, Password: password
    });
    const userData = { Username: email, Pool: userPool };
    cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

    cognitoUser.authenticateUser(authDetails, {
      onSuccess(session) {
        currentSession.idToken = session.getIdToken().getJwtToken();
        currentSession.accessToken = session.getAccessToken().getJwtToken();
        currentSession.refreshToken = session.getRefreshToken();
        showDashboard();
      },
      onFailure(err) {
        btn.disabled = false;
        btn.textContent = '登录';
        showError(errorEl, err.message || '登录失败');
      },
      newPasswordRequired(userAttributes) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('newpass-form').style.display = 'block';
        window._newPassAttrs = userAttributes;
      }
    });
  }

  function handleNewPassword() {
    const newPass = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const errorEl = document.getElementById('newpass-error');

    if (!newPass || newPass.length < 8) {
      showError(errorEl, '密码至少8位。');
      return;
    }
    if (newPass !== confirm) {
      showError(errorEl, '两次密码不一致。');
      return;
    }

    const attrs = window._newPassAttrs || {};
    delete attrs.email_verified;
    delete attrs.email;

    cognitoUser.completeNewPasswordChallenge(newPass, attrs, {
      onSuccess(session) {
        currentSession.idToken = session.getIdToken().getJwtToken();
        currentSession.accessToken = session.getAccessToken().getJwtToken();
        currentSession.refreshToken = session.getRefreshToken();
        showDashboard();
      },
      onFailure(err) {
        showError(errorEl, err.message || '设置密码失败');
      }
    });
  }

  function handleLogout() {
    if (cognitoUser) cognitoUser.signOut();
    currentSession = { idToken: null, accessToken: null, refreshToken: null };
    cognitoUser = null;
    document.getElementById('login-view').style.display = 'flex';
    document.getElementById('dashboard-view').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('newpass-form').style.display = 'none';
    document.getElementById('login-password').value = '';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = '登录';
  }

  function showDashboard() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('dashboard-view').style.display = 'block';

    // Show email
    try {
      const payload = JSON.parse(atob(currentSession.idToken.split('.')[1]));
      document.getElementById('staff-email').textContent = payload.email || '';
    } catch (e) {}

    // Check URL param
    const params = new URLSearchParams(window.location.search);
    const tagId = params.get('tagId');
    if (tagId) {
      document.getElementById('tag-input').value = tagId;
      lookupTag();
    }
  }

  // ===== API HELPERS =====
  async function apiGet(path) {
    const res = await fetch(`${CONFIG.API_BASE}${path}`, {
      headers: { 'Authorization': `Bearer ${currentSession.idToken}` }
    });
    return res.json();
  }

  async function apiPost(path, body) {
    const res = await fetch(`${CONFIG.API_BASE}${path}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${currentSession.idToken}`
      },
      body: JSON.stringify(body)
    });
    return res.json();
  }

  // ===== LOOKUP =====
  async function lookupTag() {
    const tagId = document.getElementById('tag-input').value.trim();
    if (!tagId) {
      showToast('请输入 Tag ID', 'error');
      return;
    }

    currentTagId = tagId;
    document.getElementById('results-container').style.display = 'block';
    document.getElementById('empty-state').style.display = 'none';

    // Reset panels to loading
    document.getElementById('progress-content').innerHTML = '<div class="loading-indicator"><div class="spinner"></div><span>加载中...</span></div>';
    document.getElementById('entitlement-content').innerHTML = '<div class="loading-indicator"><div class="spinner"></div><span>加载中...</span></div>';
    document.getElementById('rewards-content').innerHTML = '<div class="loading-indicator"><div class="spinner"></div><span>加载中...</span></div>';

    // Load all data in parallel
    await Promise.all([
      loadProgress(tagId),
      loadEntitlements(tagId),
      loadRewards(tagId)
    ]);
  }

  // ===== PROGRESS =====
  async function loadProgress(tagId) {
    try {
      const data = await apiGet(`/checkin/${encodeURIComponent(tagId)}`);
      if (data.error) {
        document.getElementById('progress-content').innerHTML = `<div class="empty-state">无打卡记录</div>`;
        return;
      }

      const visits = data.stations || data.visits || [];
      const totalStations = 10;
      const visitedStations = [...new Set(visits.map(v => v.stationId))];
      const pct = Math.round((visitedStations.length / totalStations) * 100);

      let stationsHtml = '';
      for (let i = 1; i <= totalStations; i++) {
        const visited = visitedStations.includes(String(i)) || visitedStations.includes(i);
        stationsHtml += `<span class="station-chip ${visited ? '' : 'not-visited'}">站${i}</span>`;
      }

      document.getElementById('progress-content').innerHTML = `
        <div class="progress-container">
          <div class="progress-text">${visitedStations.length}/${totalStations} 站已完成</div>
          <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="stations-list">${stationsHtml}</div>
      `;
    } catch (e) {
      document.getElementById('progress-content').innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
    }
  }

  // ===== ENTITLEMENTS =====
  async function loadEntitlements(tagId) {
    try {
      const data = await apiGet(`/entitlement/${encodeURIComponent(tagId)}`);
      if (data.error) {
        document.getElementById('entitlement-content').innerHTML = `<div class="empty-state">加载失败</div>`;
        return;
      }
      renderEntitlements(data);
    } catch (e) {
      document.getElementById('entitlement-content').innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
    }
  }

  function renderEntitlements(data) {
    const lunchEntitled = data.lunch && data.lunch.entitled;
    const lunchVerified = data.lunch && data.lunch.verified;
    const partyEntitled = data.party && data.party.entitled;
    const partyVerified = data.party && data.party.verified;

    const html = `
      <div class="entitlement-row">
        <span class="entitlement-label">午餐</span>
        <div class="entitlement-status">
          ${lunchEntitled
            ? '<span class="badge-entitled">有资格 ✓</span>'
            : '<span class="badge-not-entitled">无资格 ✗</span>'}
          ${lunchVerified
            ? '<span class="badge-verified">已核销 ✓</span>'
            : (lunchEntitled ? '<span style="color:var(--signal-5);font-size:0.75rem">未核销</span>' : '')}
        </div>
        <div class="entitlement-actions">
          ${lunchEntitled
            ? `<button class="btn btn-danger btn-sm" onclick="removeEntitlement('lunch')">取消资格</button>`
            : `<button class="btn btn-success btn-sm" onclick="setEntitlement('lunch')">设置资格</button>`}
          ${lunchEntitled && !lunchVerified
            ? `<button class="btn btn-primary btn-sm" onclick="verifyEntitlement('lunch')">核销</button>`
            : ''}
        </div>
      </div>
      <div class="entitlement-row">
        <span class="entitlement-label">Party</span>
        <div class="entitlement-status">
          ${partyEntitled
            ? '<span class="badge-entitled">有资格 ✓</span>'
            : '<span class="badge-not-entitled">无资格 ✗</span>'}
          ${partyVerified
            ? '<span class="badge-verified">已核销 ✓</span>'
            : (partyEntitled ? '<span style="color:var(--signal-5);font-size:0.75rem">未核销</span>' : '')}
        </div>
        <div class="entitlement-actions">
          ${partyEntitled
            ? `<button class="btn btn-danger btn-sm" onclick="removeEntitlement('party')">取消资格</button>`
            : `<button class="btn btn-success btn-sm" onclick="setEntitlement('party')">设置资格</button>`}
          ${partyEntitled && !partyVerified
            ? `<button class="btn btn-primary btn-sm" onclick="verifyEntitlement('party')">核销</button>`
            : ''}
        </div>
      </div>
    `;
    document.getElementById('entitlement-content').innerHTML = html;
  }

  async function setEntitlement(type) {
    if (!currentTagId) return;
    try {
      const data = await apiPost('/entitlement/set', { tagId: currentTagId, type });
      if (data.error) {
        showToast(`设置失败: ${data.message}`, 'error');
        return;
      }
      showToast(`${type === 'lunch' ? '午餐' : 'Party'} 资格已设置`, 'success');
      await loadEntitlements(currentTagId);
    } catch (e) {
      showToast(`设置失败: ${e.message}`, 'error');
    }
  }

  async function removeEntitlement(type) {
    if (!currentTagId) return;
    if (!confirm(`确定要取消 ${type === 'lunch' ? '午餐' : 'Party'} 资格吗？`)) return;
    try {
      const data = await apiPost('/entitlement/remove', { tagId: currentTagId, type });
      if (data.error) {
        showToast(`取消失败: ${data.message}`, 'error');
        return;
      }
      showToast(`${type === 'lunch' ? '午餐' : 'Party'} 资格已取消`, 'success');
      await loadEntitlements(currentTagId);
    } catch (e) {
      showToast(`取消失败: ${e.message}`, 'error');
    }
  }

  async function verifyEntitlement(type) {
    if (!currentTagId) return;
    if (!confirm(`确定要核销 ${type === 'lunch' ? '午餐' : 'Party'} 吗？此操作不可撤销。`)) return;
    try {
      const data = await apiPost(`/verify/${type}`, { tagId: currentTagId });
      if (data.error) {
        showToast(`核销失败: ${data.message}`, 'error');
        return;
      }
      showToast(`${type === 'lunch' ? '午餐' : 'Party'} 已核销`, 'success');
      await loadEntitlements(currentTagId);
    } catch (e) {
      showToast(`核销失败: ${e.message}`, 'error');
    }
  }

  // ===== REWARDS =====
  async function loadRewards(tagId) {
    try {
      const data = await apiGet(`/checkin/${encodeURIComponent(tagId)}/rewards`);
      if (data.error) {
        document.getElementById('rewards-content').innerHTML = `<div class="empty-state">无奖励数据</div>`;
        return;
      }

      const rewards = data.rewards || [];
      if (rewards.length === 0) {
        document.getElementById('rewards-content').innerHTML = `<div class="empty-state">暂无奖励</div>`;
        return;
      }

      let html = '';
      for (const r of rewards) {
        const redeemed = r.redeemedAt || r.redeemed;
        html += `
          <div class="reward-item">
            <span class="reward-name">${escapeHtml(r.name || r.reward || r.missionName || 'Unknown')}</span>
            ${redeemed
              ? `<span class="reward-redeemed">已领取 ✅</span>`
              : `<button class="btn btn-primary btn-sm" onclick="redeemReward('${escapeAttr(r.rewardKey || '')}')">领奖</button>`}
          </div>
        `;
      }
      document.getElementById('rewards-content').innerHTML = html;
    } catch (e) {
      document.getElementById('rewards-content').innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
    }
  }

  async function redeemReward(rewardKey) {
    if (!currentTagId || !rewardKey) return;
    try {
      const data = await apiPost('/rewards/redeem', { tagId: currentTagId, rewardKey: rewardKey });
      if (data.error) {
        showToast(`领奖失败: ${data.message}`, 'error');
        return;
      }
      showToast('奖励已领取', 'success');
      await loadRewards(currentTagId);
    } catch (e) {
      showToast(`领奖失败: ${e.message}`, 'error');
    }
  }

  // ===== UTILITIES =====
  function showError(el, msg) {
    el.textContent = msg;
    el.style.display = 'block';
  }

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type}`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  // ===== KEYBOARD SHORTCUT =====
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'tag-input') {
      lookupTag();
    }
  });

  // ===== INIT =====
  initCognito();
  </script>
</body>
</html>
